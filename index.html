<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Feed Your Snake - Fixed Collision</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #f5f8fa; touch-action: none; }
    canvas { display: block; margin: auto; }
  </style>
</head>
<body>
<script>
let snake = [];
let foods = [];
let maxFoods = 3;
let walls = [];
let dir = 'RIGHT';
let moveBuffer = []; 
let score = 0;
let level = 1;
let isRunning = false;
let isPaused = false; 
let gridSize = 20;
let cols, rows;
let slowMoTime = 0;
let startX, startY;
let screenShake = 0; 

function setup() {
  let w = windowWidth, h = windowHeight;
  const TARGET_RATIO = 9 / 16;
  if (w / h > TARGET_RATIO) w = h * TARGET_RATIO; else h = w / TARGET_RATIO;
  let canvas = createCanvas(w, h);
  let canvasElem = document.querySelector('canvas');
  canvasElem.addEventListener('touchstart', (e) => e.preventDefault(), {passive: false});
  cols = floor(width / gridSize);
  rows = floor(height / gridSize);
  initGame();
}

function draw() {
  background(245, 248, 250);
  if (screenShake > 0) {
    translate(random(-screenShake, screenShake), random(-screenShake, screenShake));
    screenShake *= 0.8;
  }
  if (!isRunning) { showStartScreen(); return; }
  drawElements();
  drawUI();
  if (isPaused) { showPauseScreen(); return; }

  let gameSpeed = (slowMoTime > 0) ? 5 : (10 + floor(level/2));
  frameRate(gameSpeed);
  if (slowMoTime > 0) slowMoTime--;
  updateSnake();
}

function updateSnake() {
  if (moveBuffer.length > 0) dir = moveBuffer.shift();
  
  let head = { ...snake[0] };
  if (dir === 'RIGHT') head.x++;
  else if (dir === 'LEFT') head.x--;
  else if (dir === 'UP') head.y--;
  else if (dir === 'DOWN') head.y++;

  // معالجة الحدود (العبور من الجانب الآخر)
  if (head.x < 0) head.x = cols - 1;
  else if (head.x >= cols) head.x = 0;
  if (head.y < 2) head.y = rows - 1; 
  else if (head.y >= rows) head.y = 2;

  // فحص التصادم (بعد تحديد الرأس الجديد وقبل إضافته)
  if (checkCollision(head)) { 
    screenShake = 15;
    setTimeout(() => endGame(), 10); // تأخير بسيط جداً ليظهر الرأس وهو يلمس العائق
    return; 
  }

  snake.unshift(head);
  let ate = false;
  for (let i = foods.length - 1; i >= 0; i--) {
    if (head.x === foods[i].x && head.y === foods[i].y) {
      applyFoodEffect(foods[i].type);
      foods.splice(i, 1);
      ate = true;
      break;
    }
  }

  if (ate) {
    if (score > 0 && score % 4 === 0) { level++; spawnWall(); }
    spawnFood(); 
  } else {
    snake.pop();
  }
}

function checkCollision(obj) {
  // فحص الجسم (نبدأ من 1 لأن 0 هو الرأس الحالي)
  for (let i = 0; i < snake.length; i++) {
    if (obj.x === snake[i].x && obj.y === snake[i].y) return true;
  }
  // فحص الجدران
  for (let w of walls) {
    if (obj.x === w.x && obj.y === w.y) return true;
  }
  return false;
}

function drawElements() {
  // حدود منطقة اللعب
  stroke(220); strokeWeight(2); noFill();
  rect(0, gridSize * 2, width, height - (gridSize * 2));
  
  // رسم الجدران
  noStroke(); fill(100);
  walls.forEach(w => rect(w.x * gridSize + 1, w.y * gridSize + 1, gridSize - 2, gridSize - 2, 4));

  // رسم الطعام
  let pulse = sin(frameCount * 0.2) * 2;
  foods.forEach(f => {
    if (f.type === 'Normal') fill(255, 70, 70);
    else if (f.type === 'Gold') fill(255, 215, 0);
    else if (f.type === 'Blue') fill(50, 150, 255);
    else fill(180, 50, 255);
    ellipse(f.x * gridSize + gridSize/2, f.y * gridSize + gridSize/2, (gridSize - 6) + pulse);
  });

  // رسم الثعبان
  snake.forEach((p, i) => {
    let col = i === 0 ? color(46, 204, 113) : color(39, 174, 96, 200);
    fill(col);
    rect(p.x * gridSize + 1, p.y * gridSize + 1, gridSize - 2, gridSize - 2, i === 0 ? 8 : 4);
  });
}

function drawUI() {
  fill(255); noStroke(); rect(0, 0, width, gridSize * 2);
  fill(50); textSize(width * 0.045); textAlign(LEFT, CENTER);
  text(`  ⭐ Score: ${score}   🏆 Lvl: ${level}`, 10, gridSize);
  if (isPaused) { fill(200, 0, 0); text(" PAUSED", width/2, gridSize); }
}

function showStartScreen() {
  textAlign(CENTER, CENTER);
  fill(46, 204, 113); textSize(width * 0.1); textStyle(BOLD);
  text("SNAKE PRO", width / 2, height * 0.3);
  fill(100); textStyle(NORMAL); textSize(width * 0.05);
  text("Swipe to Start", width / 2, height * 0.5);
}

function touchStarted() {
  if (!isRunning) { isRunning = true; return false; }
  startX = mouseX; startY = mouseY;
  return false;
}

function touchEnded() {
  let dx = mouseX - startX;
  let dy = mouseY - startY;
  if (abs(dx) > abs(dy) && abs(dx) > 10) {
    let last = moveBuffer.length > 0 ? moveBuffer[moveBuffer.length-1] : dir;
    if (dx > 0 && last !== 'LEFT') moveBuffer.push('RIGHT');
    if (dx < 0 && last !== 'RIGHT') moveBuffer.push('LEFT');
  } else if (abs(dy) > 10) {
    let last = moveBuffer.length > 0 ? moveBuffer[moveBuffer.length-1] : dir;
    if (dy > 0 && last !== 'UP') moveBuffer.push('DOWN');
    if (dy < 0 && last !== 'DOWN') moveBuffer.push('UP');
  }
}

function initGame() {
  snake = [{x: 10, y: 10}, {x: 9, y: 10}];
  foods = []; walls = []; score = 0; level = 1;
  dir = 'RIGHT'; moveBuffer = []; slowMoTime = 0;
  spawnFood();
}

function endGame() {
  if (navigator.vibrate) navigator.vibrate(200);
  alert("Game Over! Score: " + score);
  initGame();
  isRunning = false;
}

function applyFoodEffect(type) {
  if (type === 'Normal') score++;
  else if (type === 'Gold') score += 5;
  else if (type === 'Blue') { score++; if(snake.length > 2) snake.pop(); }
  else { score++; slowMoTime = 50; }
}

function spawnFood() {
  while (foods.length < maxFoods) {
    let type = random(100) < 80 ? 'Normal' : 'Gold';
    let newFood = { x: floor(random(cols)), y: floor(random(2, rows)) };
    if (!checkCollision(newFood)) foods.push({ ...newFood, type });
  }
}

function spawnWall() {
  let w = { x: floor(random(cols)), y: floor(random(2, rows)) };
  if (!checkCollision(w)) walls.push(w);
}
</script>
</body>
</html>
