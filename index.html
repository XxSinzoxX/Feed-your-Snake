<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snake Pro Elite - XxSinzoxX</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      overflow: hidden; 
      background-color: #1a1a1a; /* خلفية داكنة خارج منطقة اللعب */
      touch-action: none; 
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas { 
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
<script>
let snake = [], aiSnake = [];
let foods = [];
let walls = [];
let dir = 'RIGHT', nextDir = 'RIGHT', aiDir = 'RIGHT';
let score = 0, level = 1;
let isRunning = false, aiActive = false;
let gridSize = 20, cols, rows;
let touchPoint = null, msg = "", msgTimer = 0;
let lastGoldPos = null;

function setup() {
  // حساب الأبعاد بناءً على نسبة 9:16
  let h = windowHeight;
  let w = h * (9/16);
  
  // إذا كان عرض الشاشة أصغر من النتيجة المحسوبة
  if (w > windowWidth) {
    w = windowWidth;
    h = w * (16/9);
  }
  
  createCanvas(w, h);
  cols = floor(width / gridSize);
  rows = floor(height / gridSize);
  initGame();
}

function draw() {
  background(245, 248, 250); // لون خلفية اللعبة الأصلي
  
  if (!isRunning) { showStartScreen(); return; }
  
  drawElements();
  drawUI();
  drawJoystick();

  // سرعة متزنة (تبدأ بـ 7 وتزيد ببطء)
  let speed = 7 + floor(level / 2.5);
  frameRate(speed);

  updateSnake();
  if (aiActive) updateAISnake();
  checkLevelUp();
}

function updateSnake() {
  dir = nextDir;
  let head = { ...snake[0] };
  if (dir === 'RIGHT') head.x++;
  else if (dir === 'LEFT') head.x--;
  else if (dir === 'UP') head.y--;
  else if (dir === 'DOWN') head.y++;

  // عبور الشاشة
  head.x = (head.x + cols) % cols;
  head.y = head.y < 3 ? rows - 1 : (head.y >= rows ? 3 : head.y);

  if (checkCollision(head, snake)) { endGame("لقد أكلت نفسك! 🐍"); return; }
  if (checkWallCollision(head)) { endGame("اصطدمت بالعائق! 🧱"); return; }

  snake.unshift(head);
  let ate = false;
  for (let i = foods.length - 1; i >= 0; i--) {
    if (head.x === foods[i].x && head.y === foods[i].y) {
      if (foods[i].type === 'Gold') lastGoldPos = {x: head.x, y: head.y};
      applyEffect(foods[i].type);
      foods.splice(i, 1);
      ate = true;
      break;
    }
  }

  if (!ate) {
    let tail = snake.pop();
    if (lastGoldPos && tail.x === lastGoldPos.x && tail.y === lastGoldPos.y) {
      walls.push({...lastGoldPos});
      lastGoldPos = null;
    }
  }
  spawnFood();
}

function updateAISnake() {
  let head = { ...aiSnake[0] };
  let target = foods[0];
  if (target) {
    if (head.x < target.x && aiDir !== 'LEFT') aiDir = 'RIGHT';
    else if (head.x > target.x && aiDir !== 'RIGHT') aiDir = 'LEFT';
    else if (head.y < target.y && aiDir !== 'UP') aiDir = 'DOWN';
    else if (head.y > target.y && aiDir !== 'DOWN') aiDir = 'UP';
  }
  if (aiDir === 'RIGHT') head.x++;
  else if (aiDir === 'LEFT') head.x--;
  else if (aiDir === 'UP') head.y--;
  else if (aiDir === 'DOWN') head.y++;
  head.x = (head.x + cols) % cols;
  head.y = head.y < 3 ? rows - 1 : (head.y >= rows ? 3 : head.y);
  aiSnake.unshift(head);
  let ate = false;
  for (let i = foods.length - 1; i >= 0; i--) {
    if (head.x === foods[i].x && head.y === foods[i].y) { foods.splice(i, 1); ate = true; break; }
  }
  if (!ate) aiSnake.pop();
}

function checkLevelUp() {
  let oldLevel = level;
  level = 1 + floor(score / 10);
  if (level > oldLevel) {
    showMsg("عاش يا بطل! مستوى " + level);
    if (level === 5) { for(let i=0; i<5; i++) spawnWall(); }
    if (level === 10 && !aiActive) {
      aiActive = true;
      aiSnake = [{x: 2, y: 5}];
      showMsg("تحذير: دخل الثعبان المنافس!");
    }
  }
}

function applyEffect(type) {
  if (type === 'Normal') score += 1;
  else if (type === 'Gold') score += 5;
  else if (type === 'Blue') score += 2;
}

function drawElements() {
  fill(255); noStroke(); rect(0, gridSize*3, width, height);
  fill(120);
  walls.forEach(w => rect(w.x * gridSize + 1, w.y * gridSize + 1, gridSize - 2, gridSize - 2, 4));
  
  foods.forEach(f => {
    if (f.type === 'Normal') fill(255, 70, 70);
    else if (f.type === 'Gold') fill(255, 215, 0);
    else fill(50, 150, 255);
    ellipse(f.x * gridSize + gridSize/2, f.y * gridSize + gridSize/2, gridSize - 6);
    f.timer--;
    if (f.timer <= 0) {
      walls.push({x: f.x, y: f.y});
      foods.splice(foods.indexOf(f), 1);
    }
  });

  snake.forEach((p, i) => {
    fill(i === 0 ? '#2ecc71' : '#27ae60');
    rect(p.x * gridSize + 1, p.y * gridSize + 1, gridSize - 2, gridSize - 2, i === 0 ? 8 : 4);
  });

  if (aiActive) {
    aiSnake.forEach((p, i) => {
      fill(i === 0 ? '#e74c3c' : '#c0392b');
      rect(p.x * gridSize + 1, p.y * gridSize + 1, gridSize - 2, gridSize - 2, 5);
    });
  }
}

function spawnFood() {
  let currentNormal = foods.filter(f => f.type === 'Normal').length;
  while (currentNormal < 2) {
    let f = { x: floor(random(cols)), y: floor(random(3, rows)), type: 'Normal', timer: 600 };
    if (!checkWallCollision(f)) { foods.push(f); currentNormal++; }
  }
  if (level >= 5 && foods.length < 4 && random(1) < 0.01) {
    let type = random(['Gold', 'Blue']);
    let f = { x: floor(random(cols)), y: floor(random(3, rows)), type: type, timer: 400 };
    if (!checkWallCollision(f)) foods.push(f);
  }
}

function spawnWall() {
  let w = { x: floor(random(cols)), y: floor(random(3, rows)) };
  if (!checkWallCollision(w) && dist(w.x, w.y, snake[0].x, snake[0].y) > 5) walls.push(w);
}

function checkCollision(head, body) {
  for (let i = 1; i < body.length; i++) {
    if (head.x === body[i].x && head.y === body[i].y) return true;
  }
  return false;
}

function checkWallCollision(obj) {
  return walls.some(w => w.x === obj.x && w.y === obj.y);
}

function drawUI() {
  fill(255); rect(0, 0, width, gridSize * 3);
  fill(50); textSize(width * 0.045); textAlign(LEFT, CENTER);
  text(` ⭐ Score: ${score} | Level: ${level}`, 15, gridSize);
  
  textSize(width * 0.035); textAlign(RIGHT);
  text("🔴+1 | 🟡+5 (Wall) | 🔵+2", width - 15, gridSize * 2);

  if (msgTimer > 0) {
    textAlign(CENTER); textSize(width * 0.07); fill(255, 100, 0);
    text(msg, width/2, height/2);
    msgTimer--;
  }
}

function drawJoystick() {
  if (touchPoint) {
    fill(0, 20); noStroke(); ellipse(touchPoint.x, touchPoint.y, 80);
    fill(46, 204, 113, 120); 
    let stickX = constrain(mouseX, touchPoint.x - 40, touchPoint.x + 40);
    let stickY = constrain(mouseY, touchPoint.y - 40, touchPoint.y + 40);
    ellipse(stickX, stickY, 40);
  }
}

function touchStarted() {
  if (!isRunning) { isRunning = true; return false; }
  touchPoint = {x: mouseX, y: mouseY};
  return false;
}

function touchEnded() {
  if (!touchPoint) return;
  let dx = mouseX - touchPoint.x;
  let dy = mouseY - touchPoint.y;
  if (abs(dx) > abs(dy)) {
    if (dx > 20 && dir !== 'LEFT') nextDir = 'RIGHT';
    if (dx < -20 && dir !== 'RIGHT') nextDir = 'LEFT';
  } else {
    if (dy > 20 && dir !== 'UP') nextDir = 'DOWN';
    if (dy < -20 && dir !== 'DOWN') nextDir = 'UP';
  }
  touchPoint = null;
  return false;
}

function showMsg(t) { msg = t; msgTimer = 100; }

function initGame() {
  snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
  foods = []; walls = []; score = 0; level = 1;
  aiActive = false; isRunning = false; nextDir = 'RIGHT'; dir = 'RIGHT';
  spawnFood();
}

function endGame(reason) {
  alert(reason + "\n النتيجة النهائية: " + score);
  initGame();
}

function showStartScreen() {
  textAlign(CENTER, CENTER);
  fill(46, 204, 113); textSize(width * 0.12); textStyle(BOLD);
  text("SNAKE ELITE", width / 2, height * 0.3);
  fill(100); textStyle(NORMAL); textSize(width * 0.045);
  text("Dev: XxSinzoxX & Ammar", width / 2, height * 0.38);
  
  textSize(width * 0.05); fill(80);
  text("Level 5: Walls Appear", width/2, height * 0.5);
  text("Level 10: AI Enemy", width/2, height * 0.55);
  
  textSize(width * 0.06); fill(46, 204, 113);
  text("Touch to Start", width / 2, height * 0.7);
}
</script>
</body>
</html>
